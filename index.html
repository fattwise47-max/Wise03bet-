            scoreFinal = ["1-2","0-2","1-1","0-1","1-3"][Math.floor(Math.random()*5)];
        } else {
            scoreFinal = ["1-1","2-1","1-2","1-0","0-1","2-2"][Math.floor(Math.random()*6)];
        }
        
        const marche = MARKETS[Math.floor(Math.random() * MARKETS.length)];
        const [fh, fa] = scoreFinal.split('-').map(Number);
        const miTemps = `${Math.floor(fh/2)}-${Math.floor(fa/2)}`;
        return { scoreFinal, marche, miTemps };
    }

    // ===== AUTHENTIFICATION =====
    async function checkSession() {
        document.getElementById('splashText').innerText = 'Vérification session...';
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
            await loadOrCreateUser(session.user.id, session.user.email);
            showDashboard();
        } else {
            setTimeout(() => {
                document.getElementById('splashScreen').style.display = 'none';
                document.getElementById('appShell').style.display = 'block';
                document.getElementById('auth-screen').style.display = 'block';
            }, 1000);
        }
    }
    
    supabase.auth.onAuthStateChange(async (event, session) => {
        if (session) {
            await loadOrCreateUser(session.user.id, session.user.email);
            showDashboard();
        } else if (event === 'SIGNED_OUT') {
            location.reload();
        }
    });
    
    async function loadOrCreateUser(uid, email) {
        document.getElementById('splashText').innerText = 'Chargement profil...';
        let { data, error } = await supabase.from('user_profiles').select('*').eq('id', uid).single();
        
        if (error || !data) {
            const newUser = {
                id: uid, email: email, name: "", whatsapp: "", is_verified: false,
                is_premium: false, is_blocked: false, is_admin: false,
                messages: [], tickets: [], daily_count: 0, unread_messages: 0, global_ads: []
            };
            await supabase.from('user_profiles').insert([newUser]);
            currentUserData = newUser;
        } else {
            currentUserData = data;
        }
        currentUserData.uid = uid;
        document.getElementById('splashText').innerText = 'Prêt !';
        setTimeout(() => {
            document.getElementById('splashScreen').style.display = 'none';
            document.getElementById('appShell').style.display = 'block';
        }, 500);
    }
    
    async function saveUser() {
        if(!currentUserData) return;
        const { uid, ...data } = currentUserData;
        await supabase.from('user_profiles').update(data).eq('id', uid);
    }
    
    async function loginUser() {
        const email = document.getElementById('login-email').value.trim();
        const pass = document.getElementById('login-pass').value;
        const { error } = await supabase.auth.signInWithPassword({ email, password: pass });
        if(error) document.getElementById('login-error').innerText = "Email ou mot de passe incorrect";
    }
    
    async function registerUser() {
        const name = document.getElementById('reg-name').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        const whatsapp = document.getElementById('reg-whatsapp').value.trim();
        const pass = document.getElementById('reg-pass').value;
        if(pass.length < 6) { document.getElementById('email-error').innerText = "Mot de passe min 6 caractères"; return; }
        const { error } = await supabase.auth.signUp({ email, password: pass });
        if(error) { document.getElementById('email-error').innerText = error.message; return; }
        setTimeout(async () => {
            if(currentUserData) { currentUserData.name = name; currentUserData.whatsapp = whatsapp; await saveUser(); }
            alert("Compte créé ! Connectez-vous.");
            toggleAuth(false);
        }, 1000);
    }
    
    async function logout() { await supabase.auth.signOut(); location.reload(); }
    
    function showDashboard() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('register-screen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        const dl = document.getElementById('teams-list');
        ALL_TEAMS.forEach(t => { let opt = document.createElement('option'); opt.value = t; dl.appendChild(opt); });
        document.getElementById('predict-main').style.display = 'block';
        document.getElementById('verify-alert').style.display = 'none';
        if(currentUserData.is_admin) document.getElementById('admin-panel').style.display = 'block';
        renderSavedTickets();
        renderProfile();
    }
    
    function switchView(view) {
        document.getElementById('view-predict').style.display = view === 'predict' ? 'block' : 'none';
        document.getElementById('view-tickets').style.display = view === 'tickets' ? 'block' : 'none';
        document.getElementById('view-profile').style.display = view === 'profile' ? 'block' : 'none';
        document.getElementById('view-ticket-detail').style.display = 'none';
        if(view === 'tickets') renderSavedTickets();
        if(view === 'profile') renderProfile();
    }
    
    function runAnalysis() {
        const h = document.getElementById('team-h').value.trim();
        const a = document.getElementById('team-a').value.trim();
        if(!ALL_TEAMS.includes(h) || !ALL_TEAMS.includes(a)) {
            document.getElementById('ana-error').innerText = "Équipe invalide";
            return;
        }
        const gen = genererPrediction(h, a);
        tempMatch = { h, a, market: gen.marche, score: gen.scoreFinal, ht: gen.miTemps };
        document.getElementById('res-h').innerHTML = `${h}<div class="team-strength">${getStrengthLabel(h)}</div>`;
        document.getElementById('res-a').innerHTML = `${a}<div class="team-strength">${getStrengthLabel(a)}</div>`;
        document.getElementById('res-market').innerText = tempMatch.market;
        document.getElementById('res-ht').innerText = `Mi-temps: ${tempMatch.ht}`;
        if(currentUserData.is_premium) {
            document.getElementById('premium-data').style.display = 'block';
            document.getElementById('res-score').innerText = tempMatch.score;
        } else {
            document.getElementById('premium-data').style.display = 'none';
        }
        document.getElementById('result-box').style.display = 'block';
    }
    
    function addToTicket() {
        if(!tempMatch) return;
        if(!currentUserData.is_premium && currentTicket.length >= 1) { alert("Version gratuite: 1 match max"); return; }
        currentTicket.push({...tempMatch});
        renderCurrentTicket();
        document.getElementById('result-box').style.display = 'none';
    }
    
    function renderCurrentTicket() {
        const container = document.getElementById('ticket-list');
        document.getElementById('current-ticket').style.display = currentTicket.length ? 'block' : 'none';
        document.getElementById('ticket-count').innerText = currentTicket.length;
        container.innerHTML = currentTicket.map((m,i) => `<div class="ticket-item">${m.h} vs ${m.a} - ${m.market} <span style="color:red;cursor:pointer" onclick="currentTicket.splice(${i},1);renderCurrentTicket()">✖</span></div>`).join('');
    }
    
    async function saveTicket() {
        if(!currentTicket.length) return;
        if(!currentUserData.tickets) currentUserData.tickets = [];
        currentUserData.tickets.unshift({date: new Date().toLocaleString(), matches: [...currentTicket]});
        currentTicket = [];
        renderCurrentTicket();
        await saveUser();
        alert("Ticket enregistré !");
        switchView('tickets');
    }
    
    function renderSavedTickets() {
        const container = document.getElementById('tickets-list-view');
        if(!currentUserData.tickets?.length) { container.innerHTML = '<p class="card">Aucun ticket enregistré</p>'; return; }
        container.innerHTML = currentUserData.tickets.map((t, i) => `<div class="card ticket-card" onclick="viewTicket(${i})">📅 ${t.date}<br>📊 ${t.matches.length} match(s)</div>`).join('');
    }
    
    function viewTicket(idx) {
        const ticket = currentUserData.tickets[idx];
        document.getElementById('ticket-detail-content').innerHTML = `
            <div class="detail-header">🎫 Ticket du ${ticket.date}</div>
            ${ticket.matches.map(m => `<div class="card">${m.h} vs ${m.a}<br>🎯 ${m.market}${m.score ? ` (${m.score})` : ''}<br>${getStrengthLabel(m.h)} | ${getStrengthLabel(m.a)}</div>`).join('')}
            <div class="action-buttons"><button class="btn-primary" onclick="duplicateTicket(${idx})">🔄 Doubler ce ticket</button></div>
        `;
        document.getElementById('view-tickets').style.display = 'none';
        document.getElementById('view-ticket-detail').style.display = 'block';
    }
    
    async function duplicateTicket(idx) {
        const orig = currentUserData.tickets[idx];
        const newMatches = orig.matches.map(m => {
            const gen = genererPrediction(m.h, m.a);
            return { ...m, market: gen.marche, score: gen.scoreFinal, ht: gen.miTemps };
        });
        currentUserData.tickets.unshift({date: new Date().toLocaleString(), matches: newMatches});
        await saveUser();
        alert("Ticket dupliqué !");
        backToTicketsList();
    }
    
    function backToTicketsList() {
        document.getElementById('view-ticket-detail').style.display = 'none';
        document.getElementById('view-tickets').style.display = 'block';
        renderSavedTickets();
    }
    
    function renderProfile() {
        document.getElementById('prof-name').innerText = currentUserData.name || currentUserData.email;
        document.getElementById('prof-email').innerText = currentUserData.email;
        document.getElementById('prof-whatsapp').innerHTML = `📱 ${currentUserData.whatsapp || 'Non renseigné'}`;
        let badge = currentUserData.is_premium ? '💎 PREMIUM' : (currentUserData.is_verified ? '✅ VÉRIFIÉ' : '⏳ EN ATTENTE');
        let badgeColor = currentUserData.is_premium ? '#d946ef' : (currentUserData.is_verified ? '#22c55e' : '#94a3b8');
        document.getElementById('prof-badge').innerHTML = `<span class="status-badge" style="background:${badgeColor}">${badge}</span>`;
    }
    
    async function handleIDUpload(input) {
        alert("Fonction upload ID - Configuration Storage Supabase requise");
    }
    
    function showAdminLogin() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('admin-login').style.display = 'block';
    }
    
    function loginAdmin() {
        if(document.getElementById('admin-code').value === "0033mutwe") {
            if(currentUserData) currentUserData.is_admin = true;
            saveUser();
            document.getElementById('admin-login').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            loadAllUsers();
        } else {
            document.getElementById('admin-error').innerText = "Code incorrect";
        }
    }
    
    async function loadAllUsers() {
        const { data } = await supabase.from('user_profiles').select('*');
        if(data) {
            usersCache = data;
            document.getElementById('admin-users').innerHTML = usersCache.map(u => `
                <div class="card">
                    <b>${u.name || u.email}</b><br>
                    WhatsApp: ${u.whatsapp || '-'}<br>
                    Vérifié: ${u.is_verified ? '✅' : '❌'} | Premium: ${u.is_premium ? '💎' : '-'}
                    <div style="display:flex;gap:5px;margin-top:10px;">
                        <button class="btn-primary" onclick="adminVerify('${u.id}')">Vérifier</button>
                        <button class="btn-primary" onclick="openPremiumModal('${u.id}')">Premium</button>
                    </div>
                </div>
            `).join('');
        }
    }
    
    async function adminVerify(uid) {
        await supabase.from('user_profiles').update({ is_verified: true }).eq('id', uid);
        alert("Utilisateur vérifié !");
        loadAllUsers();
    }
    
    function openPremiumModal(uid) {
        adminTargetUid = uid;
        document.getElementById('modal-premium').classList.add('active');
    }
    
    async function confirmPremium() {
        const days = parseInt(document.getElementById('pre-days').value) || 30;
        const expiry = new Date();
        expiry.setDate(expiry.getDate() + days);
        await supabase.from('user_profiles').update({ is_premium: true, premium_expiry: expiry.toISOString() }).eq('id', adminTargetUid);
        alert(`Premium ${days} jours activé !`);
        closeModal();
        loadAllUsers();
    }
    
    async function sendGlobalAd() {
        const title = document.getElementById('ad-title').value || "Nouvelle offre";
        const adData = { id: Date.now(), title, type: 'image', media: 'https://via.placeholder.com/100x50?text=Promo', date: new Date().toLocaleString() };
        const { data: users } = await supabase.from('user_profiles').select('id, global_ads');
        for(let u of users) {
            let ads = u.global_ads || [];
            ads.unshift(adData);
            if(ads.length > 10) ads.pop();
            await supabase.from('user_profiles').update({ global_ads: ads }).eq('id', u.id);
        }
        alert("Annonce envoyée !");
    }
    
    function closeModal() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); }
    function toggleAuth(showReg) {
        document.getElementById('auth-screen').style.display = showReg ? 'none' : 'block';
        document.getElementById('register-screen').style.display = showReg ? 'block' : 'none';
    }
    function toggleAssistant() { document.getElementById('assistant-chat').classList.toggle('active'); }
    function askZola() {
        const input = document.getElementById('assistant-input');
        const msg = input.value;
        if(!msg) return;
        const container = document.getElementById('assistant-messages');
        container.innerHTML += `<div class="assistant-bubble assistant-user">${msg}</div>`;
        input.value = '';
        setTimeout(() => {
            container.innerHTML += `<div class="assistant-bubble assistant-bot">🤖 Cliquez sur un ticket pour le dupliquer !</div>`;
            container.scrollTop = container.scrollHeight;
        }, 500);
    }
    
    // LANCEMENT
    document.getElementById('splashText').innerText = 'Initialisation...';
    checkSession();
</script>

<div id="modal-premium" class="modal">
    <div class="modal-content">
        <h4>Activer Premium</h4>
        <input type="number" id="pre-days" placeholder="Nombre de jours" value="30">
        <button class="btn-primary" onclick="confirmPremium()">ACTIVER</button>
        <button class="btn-ghost" onclick="closeModal()">ANNULER</button>
    </div>
</div>
